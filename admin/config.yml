backend:
 name: github
 repo: YOUR_GITHUB_USERNAME/YOUR_REPO
 branch: main

local_backend: true

media_folder: media
public_folder: /media

collections:
 - name: releases
 label: Releases
 format: json
 file: data/releases.json
 fields:
 - label: Releases
 name: releases
 widget: list
 fields:
 - { label: ID, name: id, widget: string }
 - { label: Artist, name: artist, widget: select, options: [ALTERNATIVE ZERO, AMODEYA, adminGRL, ARLEKYN] }
 - { label: Tab, name: tab, widget: select, options: [alternative-zero, amodeya, admingrl, arlekyN] }
 - { label: Title, name: title, widget: string }
 - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
 - { label: Type, name: type, widget: select, options: [SINGLE, EP, ALBUM] }
 - { label: Cover, name: cover, widget: image }
 - { label: Page, name: page, widget: string }
 - { label: MP3, name: audioMp3, widget: file }
 - { label: FLAC, name: audioFlac, widget: file, required: false }
 - { label: Description, name: description, widget: text, required: false }
 - { label: Tags, name: tags, widget: list, required: false }
 - { label: Genres, name: genres, widget: list, required: false }
 - label: Tracks
 name: tracks
 widget: list
 fields:
 - { label: Title, name: title, widget: string }
 - { label: Duration, name: duration, widget: string, required: false }
